<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" width="1200" height="340">
  <defs>
    <!-- Dark base gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050a0f"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#060c14"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow1" cx="30%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="30%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <!-- Grid line fade -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="70%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <!-- Text glow filter -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#glow1)"/>
  <rect width="1200" height="340" fill="url(#glow2)"/>

  <!-- Subtle grid lines horizontal -->
  <line x1="0" y1="85" x2="1200" y2="85" stroke="url(#gridFade)" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="170" x2="1200" y2="170" stroke="url(#gridFade)" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="255" x2="1200" y2="255" stroke="url(#gridFade)" stroke-width="0.5" opacity="0.5"/>

  <!-- Vertical grid lines -->
  <line x1="300" y1="0" x2="300" y2="340" stroke="#00d4ff" stroke-width="0.4" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="340" stroke="#00d4ff" stroke-width="0.4" opacity="0.08"/>
  <line x1="900" y1="0" x2="900" y2="340" stroke="#00d4ff" stroke-width="0.4" opacity="0.08"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#gridFade)" opacity="0.8"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="337" width="1200" height="3" fill="url(#gridFade)" opacity="0.8"/>

  <!-- Left decorative bracket shape -->
  <g opacity="0.5">
    <polyline points="68,80 48,80 48,260 68,260" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" filter="url(#lineGlow)"/>
  </g>

  <!-- Right decorative bracket shape -->
  <g opacity="0.5">
    <polyline points="1132,80 1152,80 1152,260 1132,260" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" filter="url(#lineGlow)"/>
  </g>

  <!-- Dot grid cluster top-right -->
  <g opacity="0.25">
    <circle cx="950" cy="45" r="1.5" fill="#00d4ff"/>
    <circle cx="970" cy="45" r="1.5" fill="#00d4ff"/>
    <circle cx="990" cy="45" r="1.5" fill="#00d4ff"/>
    <circle cx="1010" cy="45" r="1.5" fill="#00d4ff"/>
    <circle cx="950" cy="63" r="1.5" fill="#00d4ff"/>
    <circle cx="970" cy="63" r="1.5" fill="#00d4ff"/>
    <circle cx="990" cy="63" r="1.5" fill="#00d4ff"/>
    <circle cx="1010" cy="63" r="1.5" fill="#00d4ff"/>
    <circle cx="950" cy="81" r="1.5" fill="#00d4ff"/>
    <circle cx="970" cy="81" r="1.5" fill="#00d4ff"/>
    <circle cx="990" cy="81" r="1.5" fill="#00d4ff"/>
    <circle cx="1010" cy="81" r="1.5" fill="#00d4ff"/>
  </g>

  <!-- Dot grid cluster bottom-left -->
  <g opacity="0.25">
    <circle cx="190" cy="260" r="1.5" fill="#7c3aed"/>
    <circle cx="210" cy="260" r="1.5" fill="#7c3aed"/>
    <circle cx="230" cy="260" r="1.5" fill="#7c3aed"/>
    <circle cx="190" cy="278" r="1.5" fill="#7c3aed"/>
    <circle cx="210" cy="278" r="1.5" fill="#7c3aed"/>
    <circle cx="230" cy="278" r="1.5" fill="#7c3aed"/>
    <circle cx="190" cy="296" r="1.5" fill="#7c3aed"/>
    <circle cx="210" cy="296" r="1.5" fill="#7c3aed"/>
    <circle cx="230" cy="296" r="1.5" fill="#7c3aed"/>
  </g>

  <!-- Glowing horizontal accent line -->
  <line x1="200" y1="175" x2="1000" y2="175" stroke="#00d4ff" stroke-width="0.8" opacity="0.15" filter="url(#lineGlow)"/>

  <!-- Small triangle accent top-left -->
  <polygon points="100,50 116,50 108,35" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- Small circle accent bottom-right -->
  <circle cx="1090" cy="295" r="18" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.35"/>
  <circle cx="1090" cy="295" r="10" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.25"/>

  <!-- Main name text -->
  <text
    x="600" y="148"
    font-family="'Courier New', Courier, monospace"
    font-size="72"
    font-weight="700"
    letter-spacing="8"
    text-anchor="middle"
    fill="#e8f4fd"
    filter="url(#textGlow)"
  >AKSHAT GUPTA</text>

  <!-- Cyan accent underscore line under name -->
  <rect x="250" y="162" width="700" height="2" rx="1" fill="url(#gridFade)" opacity="0.9"/>

  <!-- Subtitle -->
  <text
    x="600" y="215"
    font-family="'Courier New', Courier, monospace"
    font-size="18"
    font-weight="400"
    letter-spacing="6"
    text-anchor="middle"
    fill="#00d4ff"
    opacity="0.85"
  >FULL STACK  ·  SYSTEMS ENGINEER  ·  CP ENTHUSIAST</text>

  <!-- Tech tags row -->
  <!-- Tag 1 -->
  <rect x="296" y="248" width="112" height="26" rx="4" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="352" y="265" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="600" letter-spacing="2" text-anchor="middle" fill="#00d4ff" opacity="0.9">NEXT.JS</text>

  <!-- Tag 2 -->
  <rect x="420" y="248" width="112" height="26" rx="4" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="476" y="265" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="600" letter-spacing="2" text-anchor="middle" fill="#00d4ff" opacity="0.9">TYPESCRIPT</text>

  <!-- Tag 3 -->
  <rect x="544" y="248" width="112" height="26" rx="4" fill="#7c3aed" fill-opacity="0.1" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="600" y="265" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="600" letter-spacing="2" text-anchor="middle" fill="#a78bfa" opacity="0.9">DOCKER</text>

  <!-- Tag 4 -->
  <rect x="668" y="248" width="112" height="26" rx="4" fill="#7c3aed" fill-opacity="0.1" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="724" y="265" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="600" letter-spacing="2" text-anchor="middle" fill="#a78bfa" opacity="0.9">WEBSOCKETS</text>

  <!-- Tag 5 -->
  <rect x="792" y="248" width="112" height="26" rx="4" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="848" y="265" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="600" letter-spacing="2" text-anchor="middle" fill="#00d4ff" opacity="0.9">TURBOREPO</text>

  <!-- Corner markers -->
  <line x1="0" y1="0" x2="30" y2="0" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="0" x2="0" y2="30" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>

  <line x1="1200" y1="0" x2="1170" y2="0" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="1200" y1="0" x2="1200" y2="30" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>

  <line x1="0" y1="340" x2="30" y2="340" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="340" x2="0" y2="310" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>

  <line x1="1200" y1="340" x2="1170" y2="340" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="1200" y1="340" x2="1200" y2="310" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
</svg>
